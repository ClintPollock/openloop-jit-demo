name: britive-jit-demo

# Generic JIT demo: GitHub OIDC -> Britive (federated SI) -> AWS + GCP
# with no static credentials anywhere in this repo.
#
# To reuse this for your own Britive tenant, change the env vars below.
# No GitHub Secrets required.

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  # === Britive tenant ====================================================
  BRITIVE_TENANT: openloop-poc                       # <- your tenant slug
  BRITIVE_FED_PROVIDER: github-britive-openloop-poc  # <- "github-<allowed-audience>" (matches your Britive OIDC IdP)
  # === Profile paths (use `pybritive ls profiles` to find yours) =========
  AWS_PROFILE_PATH: 'AWS/080147880424 (openloop-poc (080147880424))/openloop-pov-admin'
  GCP_PROFILE: 'Google Cloud/Google Cloud/openloop-pov-gcp-storage-admin'
  # === Demo target buckets (workflow self-creates if missing) ===========
  S3_BUCKET: britive-jit-demo-080147880424
  GCS_BUCKET: britive-jit-demo-585077634997
  AWS_REGION: us-east-1
  GCP_REGION: us-central1

jobs:

  # =========================================================================
  # AWS — checkout AWS profile via Britive, write per-run file to S3
  # =========================================================================
  aws-jit-write:
    name: AWS JIT write
    runs-on: ubuntu-latest
    steps:
      - name: Install pybritive
        run: pip install --quiet pybritive

      - name: Britive checkout (GitHub OIDC -> Britive -> AWS)
        run: |
          # env-nix emits `export AWS_*="value"` lines (plus a KUBECONFIG warning).
          # Filter to only AWS_* exports, then source.
          pybritive checkout "$AWS_PROFILE_PATH" \
            --federation-provider "$BRITIVE_FED_PROVIDER" \
            --silent --mode env-nix \
            | grep -E '^export AWS_' > /tmp/aws.env
          set -a; source /tmp/aws.env; set +a
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "::add-mask::$AWS_SESSION_TOKEN"
          {
            echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
            echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
            echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN"
          } >> $GITHUB_ENV

      - name: Verify auth
        run: aws sts get-caller-identity

      - name: Ensure S3 bucket exists
        run: |
          aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null || \
            aws s3api create-bucket --bucket "$S3_BUCKET" --region "$AWS_REGION"

      - name: Write per-run file to S3
        run: |
          cat > /tmp/payload.txt <<EOF
          Britive JIT demo (AWS)
          ========================
          run_id:        ${{ github.run_id }}
          repo:          ${{ github.repository }}
          ref:           ${{ github.ref }}
          actor:         ${{ github.actor }}
          commit:        ${{ github.sha }}
          time:          $(date -u +%Y-%m-%dT%H:%M:%SZ)
          auth_path:     GitHub OIDC -> Britive (federated SI) -> AWS profile
          static_creds:  none
          EOF
          aws s3 cp /tmp/payload.txt "s3://${S3_BUCKET}/jit-demo/aws-run-${{ github.run_id }}.txt"
          echo "::notice::Wrote s3://${S3_BUCKET}/jit-demo/aws-run-${{ github.run_id }}.txt"

      - name: List recent files (proof of past runs)
        run: |
          echo "Last 10 files in s3://${S3_BUCKET}/jit-demo/:"
          aws s3api list-objects-v2 --bucket "$S3_BUCKET" --prefix jit-demo/ \
            --query 'reverse(sort_by(Contents,&LastModified))[:10].[LastModified,Size,Key]' \
            --output table

      - name: Britive checkin
        if: always()
        run: pybritive checkin "$AWS_PROFILE_PATH" || true

  # =========================================================================
  # GCP — checkout storage profile via Britive, write per-run file to GCS
  # KNOWN ISSUE: Britive's federated-SI programmatic checkout for GCP-WIF
  # profiles does not currently attach the requested role to the shadow SA.
  # The shadow SA is created and a key is returned, but role binding is
  # missing -> writes return 403 storage.objects.get denied.
  # AWS path works because it uses SAML role assumption (different code path).
  # =========================================================================
  gcp-jit-write:
    name: GCP JIT write
    runs-on: ubuntu-latest
    steps:
      - name: Install pybritive
        run: pip install --quiet pybritive

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Britive checkout (GitHub OIDC -> Britive -> GCP)
        run: |
          # WIF profiles only support `-m json` (returns {sa_email: keyJson_str}).
          # Unwrap to the inner SA key JSON and feed it to gcloud.
          mkdir -p ~/.gcp
          pybritive configure update profile-aliases gcp-default "$GCP_PROFILE"
          pybritive checkout gcp-default -m json -P "$BRITIVE_FED_PROVIDER" --silent | \
            python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); sys.stdout.write(list(d.values())[0])' \
            > ~/.gcp/sa-key.json
          test -s ~/.gcp/sa-key.json || { echo "::error::Empty SA key file"; exit 1; }
          # Newly-minted SA keys take a few seconds to be usable; retry activate.
          for i in 1 2 3 4 5; do
            if gcloud auth activate-service-account --key-file=$HOME/.gcp/sa-key.json 2>&1; then
              break
            fi
            echo "Activate attempt $i failed (likely SA key not yet propagated); waiting 5s..."
            sleep 5
          done
          gcloud config set project openloop-poc-core

      - name: Wait for IAM propagation
        # Britive attaches roles/storage.admin at folder scope on checkout, but Google's
        # IAM evaluation cache for newly-created SAs is slow to recognize the binding.
        # Local test (token-based SI): ~30s. GH Actions (federated SI): seems longer.
        run: sleep 90

      - name: Ensure GCS bucket exists
        run: |
          if ! gsutil ls -b "gs://${GCS_BUCKET}" 2>/dev/null; then
            gsutil mb -l "$GCP_REGION" -b on "gs://${GCS_BUCKET}"
          fi

      - name: Write per-run file to GCS
        run: |
          cat > /tmp/payload.txt <<EOF
          Britive JIT demo (GCP)
          ========================
          run_id:        ${{ github.run_id }}
          repo:          ${{ github.repository }}
          ref:           ${{ github.ref }}
          actor:         ${{ github.actor }}
          commit:        ${{ github.sha }}
          time:          $(date -u +%Y-%m-%dT%H:%M:%SZ)
          auth_path:     GitHub OIDC -> Britive (federated SI) -> GCP profile
          static_creds:  none
          EOF
          gsutil cp /tmp/payload.txt "gs://${GCS_BUCKET}/jit-demo/gcp-run-${{ github.run_id }}.txt"
          echo "::notice::Wrote gs://${GCS_BUCKET}/jit-demo/gcp-run-${{ github.run_id }}.txt"

      - name: List recent files (proof of past runs)
        run: |
          echo "Last 10 files in gs://${GCS_BUCKET}/jit-demo/:"
          gsutil ls -l "gs://${GCS_BUCKET}/jit-demo/**" 2>/dev/null | sort -r | head -10 || true

      - name: Britive checkin
        if: always()
        run: pybritive checkin gcp-default || true
